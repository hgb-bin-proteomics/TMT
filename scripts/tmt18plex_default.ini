        <ITEM name="reporter_mass_shift" value="2.0000000000000000e-03" type="double" description="Allowed shift (left to right) in Th from the expected position." required="false" advanced="false" restrictions="1.0e-04:0.5" />
        <ITEM name="min_precursor_intensity" value="1.0" type="double" description="Minimum intensity of the precursor to be extracted. MS/MS scans having a precursor with a lower intensity will not be considered for quantitation." required="false" advanced="false" restrictions="0.0:" />
        <ITEM name="keep_unannotated_precursor" value="true" type="string" description="Flag if precursor with missing intensity value or missing precursor spectrum should be included or not." required="false" advanced="false" restrictions="true,false" />
        <ITEM name="min_reporter_intensity" value="0.0" type="double" description="Minimum intensity of the individual reporter ions to be extracted." required="false" advanced="false" restrictions="0.0:" />
        <ITEM name="discard_low_intensity_quantifications" value="false" type="bool" description="Remove all reporter intensities if a single reporter is below the threshold given in &apos;min_reporter_intensity&apos;." required="false" advanced="false" />
